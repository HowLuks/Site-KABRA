<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KABRA | Blog</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .blog-header {
            padding: 150px 0 80px;
            text-align: center;
            background: var(--color-bg-darker);
            border-bottom: 1px solid rgba(242, 236, 218, 0.05);
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2.5rem;
            padding: 5rem 0;
        }

        @media (max-width: 1024px) {
            .blog-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .blog-grid {
                grid-template-columns: 1fr;
            }
        }

        .post-card {
            background-color: var(--color-bg-dark);
            border-radius: 8px;
            overflow: hidden;
            transition: transform var(--ts-smooth);
            border-top: 4px solid var(--color-details);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .post-card:hover {
            transform: translateY(-8px);
            border-top-color: var(--color-cta);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .post-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background-color: var(--color-bg-darker);
        }

        .post-content {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .post-date {
            font-size: 0.85rem;
            color: var(--color-details);
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .post-title {
            font-size: 1.6rem;
            color: var(--color-creme);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .post-excerpt {
            color: var(--color-details);
            font-size: 1rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .read-more {
            color: var(--color-cta);
            font-weight: 600;
            font-family: var(--font-heading);
            font-size: 1.1rem;
            margin-top: auto;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="blog-header">
            <div class="container">
                <span class="eyebrow">Conteúdo Estratégico</span>
                <h1 class="section-title text-creme" style="font-size: 3.5rem;">KABRA <span
                        class="text-accent">Blog</span></h1>
                <p class="section-description" style="margin: 1rem auto 0; max-width: 600px;">
                    Perspectivas não-convencionais, tecnologia e estratégias focadas em aceleração de negócios.
                </p>
            </div>
        </section>

        <section class="container">
            <div class="blog-grid" id="blog-grid-container">
                <div class="empty-state"
                    style="text-align: center; width: 100%; padding: 4rem; color: var(--color-details);">
                    Carregando artigos do banco de dados...
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <div id="popup-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const supabaseClient = window.supabaseClient;
            const container = document.getElementById('blog-grid-container');

            if (!supabaseClient) {
                container.innerHTML = '<div class="empty-state" style="text-align:center; width:100%;">Banco de dados não configurado.</div>';
                return;
            }

            const { data, error } = await supabaseClient
                .from('blogs')
                .select('*')
                .eq('published', true)
                .order('created_at', { ascending: false });

            if (error || !data || data.length === 0) {
                container.innerHTML = '<div class="empty-state" style="text-align:center; width:100%;">Nenhum artigo publicado ainda. Fique de olho!</div>';
                return;
            }

            container.innerHTML = data.map(post => {
                const dateStr = new Date(post.created_at).toLocaleDateString('pt-BR');
                const imageHtml = post.image_url
                    ? `<img src="${post.image_url}" class="post-img" alt="${post.title}">`
                    : '<div class="post-img" style="display:flex; align-items:center; justify-content:center; background:#1b201d; color:var(--color-bg-darker); font-family:var(--font-heading); font-size: 2rem;">KABRA</div>';

                return `
                    <a href="post.html?id=${post.id}" class="post-card">
                        ${imageHtml}
                        <div class="post-content">
                            <span class="post-date">${dateStr}</span>
                            <h2 class="post-title">${post.title}</h2>
                            <p class="post-excerpt">${post.excerpt || ''}</p>
                            <span class="read-more">Ler artigo competo →</span>
                        </div>
                    </a>
                `;
            }).join('');
        });
    </script>
</body>

</html>
